<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>星果切切乐</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --text: #fff;
      --muted: rgba(255,255,255,.72);
      --glass: rgba(255,255,255,.13);
      --line: rgba(255,255,255,.22);
      --gold: #ffd76d;
      --cyan: #91fff5;
      --danger: #ff5e7a;
    }

    html, body { margin: 0; min-height: 100%; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 12%, rgba(145,255,245,.22), transparent 26%),
        radial-gradient(circle at 85% 12%, rgba(255,215,109,.18), transparent 26%),
        radial-gradient(circle at 80% 90%, rgba(255,94,122,.14), transparent 28%),
        linear-gradient(160deg, #111a38, #080d21 55%, #050612);
    }

    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.8) 0 1px, transparent 2px),
        radial-gradient(circle, rgba(255,255,255,.35) 0 1px, transparent 2px);
      background-size: 80px 80px, 130px 130px;
      animation: starMove 18s linear infinite;
      opacity: .42;
      pointer-events: none;
    }

    @keyframes starMove {
      from { transform: translate(0,0); }
      to { transform: translate(-70px, 80px); }
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(96vw, 920px);
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    header {
      position: relative;
      text-align: center;
      padding-top: 4px;
    }

    h1 {
      margin: 0;
      padding: 0 62px;
      font-size: clamp(30px, 6vw, 58px);
      line-height: 1.04;
      letter-spacing: 2px;
      text-shadow: 0 8px 28px rgba(0,0,0,.38);
    }

    .tip {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: clamp(12px, 2.5vw, 16px);
      line-height: 1.35;
    }

    .lang {
      position: absolute;
      right: 0;
      top: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--glass);
      color: #fff;
      padding: 8px 12px;
      font-weight: 900;
      cursor: pointer;
      backdrop-filter: blur(12px);
    }

    .modes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    button {
      font-family: inherit;
    }

    .mode {
      border: 1px solid var(--line);
      border-radius: 17px;
      background: var(--glass);
      color: #fff;
      padding: 12px 8px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
      transition: transform .14s ease, background .14s ease, border-color .14s ease;
    }

    .mode.active {
      background: linear-gradient(135deg, rgba(145,255,245,.34), rgba(255,215,109,.24));
      border-color: rgba(255,255,255,.46);
      transform: translateY(-1px);
    }

    .detail {
      display: none;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.12);
      padding: 10px;
      backdrop-filter: blur(12px);
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .detail.show { display: flex; }

    .detail p {
      margin: 0;
      color: rgba(255,255,255,.86);
      line-height: 1.45;
      font-size: 14px;
    }

    .start-small, .main-btn, .ghost-btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 18px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    .start-small, .main-btn {
      background: linear-gradient(90deg, var(--cyan), #fff1a7, var(--gold));
      color: #10172f;
      box-shadow: 0 10px 28px rgba(255,215,109,.22);
    }

    .ghost-btn {
      background: rgba(255,255,255,.14);
      color: #fff;
      border: 1px solid var(--line);
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }

    .badge {
      border: 1px solid var(--line);
      border-radius: 15px;
      background: var(--glass);
      padding: 7px 4px;
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .badge span {
      display: block;
      margin-bottom: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .badge strong {
      font-size: clamp(18px, 4.5vw, 27px);
      line-height: 1;
    }

    #arena {
      position: relative;
      flex: 1 1 auto;
      min-height: 310px;
      height: 54dvh;
      max-height: 520px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 24px;
      background:
        radial-gradient(circle at 25% 20%, rgba(145,255,245,.13), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(255,215,109,.10), transparent 25%),
        linear-gradient(180deg, rgba(34,45,92,.82), rgba(4,7,22,.96));
      box-shadow: 0 20px 70px rgba(0,0,0,.42);
      touch-action: none;
      user-select: none;
      cursor: crosshair;
    }

    #arena::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 97%, rgba(255,255,255,.05) 98%), linear-gradient(90deg, transparent 97%, rgba(255,255,255,.04) 98%);
      background-size: 40px 40px;
      opacity: .42;
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 16px;
      background: rgba(2,4,16,.62);
      backdrop-filter: blur(8px);
    }

    .card {
      width: min(92%, 450px);
      text-align: center;
      padding: 22px;
      border-radius: 26px;
      border: 1px solid rgba(255,255,255,.26);
      background: rgba(255,255,255,.16);
      box-shadow: 0 24px 70px rgba(0,0,0,.36);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: clamp(28px, 7vw, 46px);
    }

    .card p {
      margin: 8px auto 16px;
      color: rgba(255,255,255,.86);
      line-height: 1.55;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .item {
      position: absolute;
      width: var(--size);
      height: var(--size);
      display: grid;
      place-items: center;
      font-size: calc(var(--size) * .82);
      transform: translate(-50%, -50%) rotate(0deg);
      filter: drop-shadow(0 8px 12px rgba(0,0,0,.34));
      z-index: 3;
      will-change: transform, left, top;
    }

    .good { animation: glowGood 1s ease-in-out infinite alternate; }
    .bad { animation: glowBad .55s ease-in-out infinite alternate; }

    @keyframes glowGood { to { filter: drop-shadow(0 0 18px rgba(255,215,109,.82)); } }
    @keyframes glowBad { to { filter: drop-shadow(0 0 22px rgba(255,94,122,.95)); } }

    .slash {
      position: absolute;
      height: 7px;
      border-radius: 999px;
      transform-origin: left center;
      background: linear-gradient(90deg, transparent, var(--cyan), #fff, var(--gold), transparent);
      box-shadow: 0 0 18px rgba(145,255,245,.85);
      z-index: 8;
      pointer-events: none;
      animation: slashFade .28s ease-out forwards;
    }

    @keyframes slashFade {
      from { opacity: 1; transform: rotate(var(--angle)) scaleX(1); }
      to { opacity: 0; transform: rotate(var(--angle)) scaleX(.35); }
    }

    .pop {
      position: absolute;
      z-index: 9;
      transform: translate(-50%, -50%);
      font-weight: 900;
      font-size: 23px;
      text-shadow: 0 4px 16px rgba(0,0,0,.45);
      pointer-events: none;
      animation: popUp .72s ease-out forwards;
    }

    @keyframes popUp {
      from { opacity: 0; transform: translate(-50%, -25%) scale(.7); }
      25% { opacity: 1; }
      to { opacity: 0; transform: translate(-50%, -120%) scale(1.18); }
    }

    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--pcolor);
      z-index: 7;
      pointer-events: none;
      animation: burst .55s ease-out forwards;
    }

    @keyframes burst {
      to { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(.1); }
    }

    .shake { animation: shake .22s ease-in-out; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    @media (max-width: 620px) {
      .app { width: 100vw; padding: 8px; gap: 6px; }
      h1 { font-size: 29px; padding: 0 56px; letter-spacing: 1px; }
      .tip { font-size: 12px; }
      .lang { padding: 7px 9px; font-size: 12px; }
      .modes { gap: 5px; }
      .mode { padding: 9px 3px; font-size: 14px; border-radius: 13px; }
      .detail { padding: 8px; border-radius: 14px; }
      .detail p { font-size: 12px; }
      .start-small { padding: 9px 11px; font-size: 12px; }
      .hud { gap: 5px; }
      .badge { padding: 6px 2px; border-radius: 12px; }
      .badge span { font-size: 10px; }
      .badge strong { font-size: 17px; }
      #arena { height: 50dvh; min-height: 285px; max-height: 430px; border-radius: 19px; }
      .card { padding: 18px; }
      .card p { font-size: 14px; }
    }

    @media (max-height: 720px) and (max-width: 620px) {
      h1 { font-size: 25px; }
      .tip { display: none; }
      .detail p { display: none; }
      #arena { height: 48dvh; min-height: 245px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <button class="lang" id="langBtn">EN</button>
      <h1 id="title">星果切切乐</h1>
      <p class="tip" id="tip">单击查看模式，双击立即开始</p>
    </header>

    <section class="modes" aria-label="游戏模式">
      <button class="mode active" data-mode="time" id="mode-time">计时赛</button>
      <button class="mode" data-mode="speed" id="mode-speed">竞速赛</button>
      <button class="mode" data-mode="endless" id="mode-endless">持久赛</button>
    </section>

    <section class="detail show" id="detailBox">
      <p id="detailText">60 秒内尽量拿高分。</p>
      <button class="start-small" id="detailStart">开始</button>
    </section>

    <section class="hud">
      <div class="badge"><span id="scoreLabel">分数</span><strong id="score">0</strong></div>
      <div class="badge"><span id="livesLabel">生命</span><strong id="lives">3</strong></div>
      <div class="badge"><span id="goalLabel">时间</span><strong id="timer">60s</strong></div>
      <div class="badge"><span id="comboLabel">连击</span><strong id="combo">x1</strong></div>
    </section>

    <section id="arena" aria-label="游戏区域">
      <div class="overlay" id="overlay">
        <div class="card">
          <h2 id="cardTitle">准备开切！</h2>
          <p id="cardText">单击模式看说明，双击模式直接开始。</p>
          <div class="actions">
            <button class="main-btn" id="startBtn">开始游戏</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const $ = id => document.getElementById(id);

    const arena = $('arena');
    const overlay = $('overlay');
    const langBtn = $('langBtn');
    const titleEl = $('title');
    const tipEl = $('tip');
    const detailBox = $('detailBox');
    const detailText = $('detailText');
    const detailStart = $('detailStart');
    const startBtn = $('startBtn');
    const cardTitle = $('cardTitle');
    const cardText = $('cardText');
    const scoreEl = $('score');
    const livesEl = $('lives');
    const timerEl = $('timer');
    const comboEl = $('combo');
    const scoreLabel = $('scoreLabel');
    const livesLabel = $('livesLabel');
    const goalLabel = $('goalLabel');
    const comboLabel = $('comboLabel');
    const modeButtons = [...document.querySelectorAll('.mode')];

    const copy = {
      zh: {
        langCode: 'zh-CN',
        pageTitle: '星果切切乐',
        langBtn: 'EN',
        title: '星果切切乐',
        tip: '单击查看模式，双击立即开始',
        modes: {
          time: ['计时赛', '60 秒内尽量拿高分。'],
          speed: ['竞速赛', '最快切满 30 个目标。'],
          endless: ['持久赛', '没有时间限制，速度会越来越快。']
        },
        score: '分数', lives: '生命', time: '时间', goal: '目标', survive: '坚持', combo: '连击',
        start: '开始', startGame: '开始游戏', ready: '准备开切！', readyText: '单击模式看说明，双击模式直接开始。',
        again: '再玩一次', menu: '换模式',
        timeUp: '时间到！', noLives: '生命用完啦！', bomb: '炸弹爆炸！', complete: '目标完成！', lifeLost: '-生命',
        resultTime: (score, best) => `最终分数：<strong>${score}</strong><br>最高连击：<strong>x${best}</strong>`,
        resultSpeed: (sec, score) => `完成 30 个目标！<br>用时：<strong>${sec}</strong> 秒<br>分数：<strong>${score}</strong>`,
        resultEndless: (sec, score) => `坚持：<strong>${Math.floor(sec)}</strong> 秒<br>分数：<strong>${score}</strong>`
      },
      en: {
        langCode: 'en',
        pageTitle: 'Star Slice Rush',
        langBtn: '中文',
        title: 'Star Slice Rush',
        tip: 'Tap for details, double tap to start',
        modes: {
          time: ['Time Attack', 'Score as high as possible in 60 seconds.'],
          speed: ['Speed Run', 'Slice 30 targets as fast as you can.'],
          endless: ['Survival', 'No time limit. The game gets faster and faster.']
        },
        score: 'Score', lives: 'Lives', time: 'Time', goal: 'Goal', survive: 'Survive', combo: 'Combo',
        start: 'Start', startGame: 'Start Game', ready: 'Ready!', readyText: 'Tap a mode for details, double tap a mode to start.',
        again: 'Again', menu: 'Modes',
        timeUp: 'Time Up!', noLives: 'No Lives!', bomb: 'Bomb Blast!', complete: 'Goal Complete!', lifeLost: '-Life',
        resultTime: (score, best) => `Final score: <strong>${score}</strong><br>Best combo: <strong>x${best}</strong>`,
        resultSpeed: (sec, score) => `30 targets complete!<br>Time: <strong>${sec}</strong>s<br>Score: <strong>${score}</strong>`,
        resultEndless: (sec, score) => `Survived: <strong>${Math.floor(sec)}</strong>s<br>Score: <strong>${score}</strong>`
      }
    };

    let lang = localStorage.getItem('starSliceLang') || 'zh';
    let mode = 'time';
    let running = false;
    let score = 0;
    let lives = 3;
    let combo = 1;
    let bestCombo = 1;
    let comboTimer = 0;
    let timeLeft = 60;
    let elapsed = 0;
    let cutCount = 0;
    let items = [];
    let lastFrame = 0;
    let lastSpawn = 0;
    let slicing = false;
    let lastPoint = null;
    let timerId = null;
    let rafId = null;
    let lastTapTime = 0;
    let lastTapMode = '';

    const fruits = ['⭐', '🌟', '🍎', '🍊', '🍉', '🍓', '🍍', '🥝'];

    function t() { return copy[lang]; }
    function rand(min, max) { return Math.random() * (max - min) + min; }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function rect() { return arena.getBoundingClientRect(); }

    function applyLanguage() {
      const c = t();
      document.documentElement.lang = c.langCode;
      document.title = c.pageTitle;
      langBtn.textContent = c.langBtn;
      titleEl.textContent = c.title;
      tipEl.textContent = c.tip;
      scoreLabel.textContent = c.score;
      livesLabel.textContent = c.lives;
      comboLabel.textContent = c.combo;
      detailStart.textContent = c.start;
      startBtn.textContent = c.startGame;
      cardTitle.textContent = c.ready;
      cardText.textContent = c.readyText;
      modeButtons.forEach(btn => btn.textContent = c.modes[btn.dataset.mode][0]);
      showDetail(mode);
      updateHud();
    }

    function showDetail(nextMode) {
      mode = nextMode;
      modeButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
      detailText.textContent = t().modes[mode][1];
      detailBox.classList.add('show');
      updateHud();
    }

    function updateHud() {
      scoreEl.textContent = score;
      livesEl.textContent = lives;
      comboEl.textContent = 'x' + combo;
      if (mode === 'time') {
        goalLabel.textContent = t().time;
        timerEl.textContent = Math.max(0, Math.ceil(timeLeft)) + 's';
      } else if (mode === 'speed') {
        goalLabel.textContent = t().goal;
        timerEl.textContent = cutCount + '/30';
      } else {
        goalLabel.textContent = t().survive;
        timerEl.textContent = Math.floor(elapsed) + 's';
      }
    }

    function resetGame() {
      items.forEach(item => item.el.remove());
      items = [];
      document.querySelectorAll('.slash,.pop,.particle').forEach(el => el.remove());
      score = 0;
      lives = mode === 'endless' ? 5 : 3;
      combo = 1;
      bestCombo = 1;
      comboTimer = 0;
      timeLeft = 60;
      elapsed = 0;
      cutCount = 0;
      lastSpawn = 0;
      updateHud();
    }

    function startGame(selectedMode = mode) {
      mode = selectedMode;
      showDetail(mode);
      resetGame();
      running = true;
      slicing = false;
      overlay.style.display = 'none';
      modeButtons.forEach(btn => btn.disabled = true);
      detailStart.disabled = true;
      lastFrame = performance.now();
      clearInterval(timerId);
      timerId = setInterval(() => {
        if (!running) return;
        elapsed += 1;
        if (mode === 'time') {
          timeLeft -= 1;
          if (timeLeft <= 0) endGame(t().timeUp);
        }
        updateHud();
      }, 1000);
      rafId = requestAnimationFrame(loop);
    }

    function endGame(title) {
      if (!running) return;
      running = false;
      slicing = false;
      clearInterval(timerId);
      cancelAnimationFrame(rafId);
      modeButtons.forEach(btn => btn.disabled = false);
      detailStart.disabled = false;

      let result;
      if (mode === 'speed' && cutCount >= 30) result = t().resultSpeed(elapsed, score);
      else if (mode === 'endless') result = t().resultEndless(elapsed, score);
      else result = t().resultTime(score, bestCombo);

      overlay.innerHTML = `
        <div class="card">
          <h2>${title}</h2>
          <p>${result}</p>
          <div class="actions">
            <button class="main-btn" id="againBtn">${t().again}</button>
            <button class="ghost-btn" id="menuBtn">${t().menu}</button>
          </div>
        </div>
      `;
      overlay.style.display = 'grid';
      $('againBtn').addEventListener('click', () => startGame(mode));
      $('menuBtn').addEventListener('click', restoreOverlay);
    }

    function restoreOverlay() {
      overlay.innerHTML = `
        <div class="card">
          <h2 id="cardTitle">${t().ready}</h2>
          <p id="cardText">${t().readyText}</p>
          <div class="actions">
            <button class="main-btn" id="startBtn">${t().startGame}</button>
          </div>
        </div>
      `;
      $('startBtn').addEventListener('click', () => startGame(mode));
      overlay.style.display = 'grid';
    }

    function spawnItem() {
      const r = rect();
      const bad = Math.random() < (mode === 'endless' ? .24 : .18);
      const size = rand(40, 62);
      const el = document.createElement('div');
      el.className = 'item ' + (bad ? 'bad' : 'good');
      el.textContent = bad ? '💣' : pick(fruits);
      el.style.setProperty('--size', size + 'px');
      arena.appendChild(el);

      const fromLeft = Math.random() < .5;
      const x = fromLeft ? rand(25, r.width * .35) : rand(r.width * .65, r.width - 25);
      const y = r.height + size;
      const vx = (fromLeft ? 1 : -1) * rand(35, 150);
      const vy = mode === 'endless' ? -Math.min(980, 700 + elapsed * 8) : -rand(680, 840);
      items.push({ el, x, y, vx, vy, size, bad, cut: false, rot: rand(-180, 180), rotSpeed: rand(-220, 220) });
    }

    function loop(now) {
      if (!running) return;
      const dt = Math.min((now - lastFrame) / 1000, .033);
      lastFrame = now;
      comboTimer -= dt;
      if (comboTimer <= 0) combo = 1;

      const base = mode === 'speed' ? 620 : 820;
      const difficulty = mode === 'endless' ? Math.min(440, elapsed * 8) : Math.min(350, score * .45);
      const interval = Math.max(mode === 'speed' ? 300 : 350, base - difficulty);
      if (now - lastSpawn > interval) {
        spawnItem();
        if (Math.random() < .18) setTimeout(() => running && spawnItem(), 120);
        lastSpawn = now;
      }

      for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        item.vy += 1250 * dt;
        item.x += item.vx * dt;
        item.y += item.vy * dt;
        item.rot += item.rotSpeed * dt;
        item.el.style.left = item.x + 'px';
        item.el.style.top = item.y + 'px';
        item.el.style.transform = `translate(-50%, -50%) rotate(${item.rot}deg)`;

        if (item.y > arena.clientHeight + item.size + 80) {
          if (!item.bad && !item.cut) {
            lives -= 1;
            combo = 1;
            arena.classList.add('shake');
            setTimeout(() => arena.classList.remove('shake'), 240);
            if (lives <= 0) endGame(t().noLives);
          }
          item.el.remove();
          items.splice(i, 1);
        }
      }
      updateHud();
      rafId = requestAnimationFrame(loop);
    }

    function pointFromEvent(e) {
      const r = rect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    function distToSegment(px, py, ax, ay, bx, by) {
      const dx = bx - ax, dy = by - ay;
      const len2 = dx * dx + dy * dy || 1;
      let s = ((px - ax) * dx + (py - ay) * dy) / len2;
      s = Math.max(0, Math.min(1, s));
      const x = ax + s * dx, y = ay + s * dy;
      return Math.hypot(px - x, py - y);
    }

    function drawSlash(a, b) {
      const len = Math.hypot(b.x - a.x, b.y - a.y);
      if (len < 8) return;
      const el = document.createElement('div');
      el.className = 'slash';
      el.style.left = a.x + 'px';
      el.style.top = a.y + 'px';
      el.style.width = len + 'px';
      el.style.setProperty('--angle', Math.atan2(b.y - a.y, b.x - a.x) + 'rad');
      arena.appendChild(el);
      setTimeout(() => el.remove(), 300);
    }

    function sliceBetween(a, b) {
      drawSlash(a, b);
      for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        if (item.cut) continue;
        if (distToSegment(item.x, item.y, a.x, a.y, b.x, b.y) < item.size * .55) cutItem(item, i);
      }
    }

    function cutItem(item, index) {
      item.cut = true;
      item.el.remove();
      items.splice(index, 1);
      burst(item.x, item.y, item.bad ? '#ff5e7a' : '#ffd76d');

      if (item.bad) {
        lives -= 1;
        combo = 1;
        pop(item.x, item.y, t().lifeLost, '#ff8fa3');
        arena.classList.add('shake');
        setTimeout(() => arena.classList.remove('shake'), 240);
        if (mode === 'speed') elapsed += 3;
        if (lives <= 0) endGame(t().bomb);
        return;
      }

      const gain = combo * 10;
      score += gain;
      cutCount += 1;
      pop(item.x, item.y, '+' + gain, '#fff0a6');
      combo = Math.min(9, combo + 1);
      bestCombo = Math.max(bestCombo, combo);
      comboTimer = .9;
      if (mode === 'speed' && cutCount >= 30) endGame(t().complete);
    }

    function pop(x, y, message, color) {
      const el = document.createElement('div');
      el.className = 'pop';
      el.textContent = message;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.color = color;
      arena.appendChild(el);
      setTimeout(() => el.remove(), 740);
    }

    function burst(x, y, color) {
      for (let i = 0; i < 13; i++) {
        const el = document.createElement('div');
        el.className = 'particle';
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.setProperty('--pcolor', color);
        el.style.setProperty('--dx', rand(-80, 80) + 'px');
        el.style.setProperty('--dy', rand(-80, 80) + 'px');
        arena.appendChild(el);
        setTimeout(() => el.remove(), 560);
      }
    }

    function startSlice(e) {
      if (!running) return;
      e.preventDefault();
      slicing = true;
      lastPoint = pointFromEvent(e);
      arena.setPointerCapture?.(e.pointerId);
    }

    function moveSlice(e) {
      if (!running || !slicing) return;
      e.preventDefault();
      const p = pointFromEvent(e);
      sliceBetween(lastPoint, p);
      lastPoint = p;
    }

    function endSlice() {
      slicing = false;
      lastPoint = null;
    }

    modeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        if (running) return;
        const now = Date.now();
        const selected = btn.dataset.mode;
        if (lastTapMode === selected && now - lastTapTime < 330) {
          startGame(selected);
          lastTapTime = 0;
          return;
        }
        lastTapMode = selected;
        lastTapTime = now;
        showDetail(selected);
      });
    });

    langBtn.addEventListener('click', () => {
      lang = lang === 'zh' ? 'en' : 'zh';
      localStorage.setItem('starSliceLang', lang);
      applyLanguage();
      if (!running && overlay.style.display !== 'none') restoreOverlay();
    });

    detailStart.addEventListener('click', () => startGame(mode));
    startBtn.addEventListener('click', () => startGame(mode));
    arena.addEventListener('pointerdown', startSlice);
    arena.addEventListener('pointermove', moveSlice);
    window.addEventListener('pointerup', endSlice);
    window.addEventListener('pointercancel', endSlice);

    applyLanguage();
    showDetail('time');
    updateHud();
  </script>
</body>
</html>
