<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>接住小星星</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #203a74, #101527 60%, #090b14);
      color: white;
      overflow: hidden;
    }

    .wrap {
      width: min(94vw, 760px);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 54px);
      letter-spacing: 2px;
    }

    .hint {
      margin: 0 0 18px;
      opacity: .82;
      line-height: 1.6;
    }

    .panel {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      font-weight: 700;
      flex-wrap: wrap;
    }

    .badge {
      flex: 1;
      min-width: 130px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .18);
      backdrop-filter: blur(10px);
    }

    #game {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      min-height: 360px;
      border-radius: 26px;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 25%, rgba(255,255,255,.16), transparent 4%),
        radial-gradient(circle at 82% 18%, rgba(255,255,255,.13), transparent 3%),
        linear-gradient(180deg, rgba(77, 103, 194, .48), rgba(15, 22, 52, .95));
      border: 1px solid rgba(255, 255, 255, .2);
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
      touch-action: none;
    }

    #player {
      position: absolute;
      bottom: 18px;
      left: 50%;
      width: 96px;
      height: 26px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(90deg, #9ffcff, #ffffff, #ffd36b);
      box-shadow: 0 0 25px rgba(159, 252, 255, .65);
    }

    .star {
      position: absolute;
      width: 26px;
      height: 26px;
      transform: translate(-50%, -50%);
      font-size: 26px;
      line-height: 26px;
      filter: drop-shadow(0 0 10px rgba(255, 231, 93, .8));
      user-select: none;
    }

    .bomb {
      filter: drop-shadow(0 0 10px rgba(255, 80, 80, .85));
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(4, 7, 18, .68);
      backdrop-filter: blur(5px);
      padding: 24px;
    }

    .card {
      width: min(92%, 430px);
      padding: 28px;
      border-radius: 26px;
      background: rgba(255, 255, 255, .13);
      border: 1px solid rgba(255, 255, 255, .22);
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 32px;
    }

    .card p {
      margin: 8px 0 20px;
      line-height: 1.7;
      opacity: .88;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 13px 24px;
      font-size: 16px;
      font-weight: 800;
      color: #101527;
      cursor: pointer;
      background: linear-gradient(90deg, #9ffcff, #ffd36b);
      box-shadow: 0 10px 30px rgba(255, 211, 107, .28);
    }

    button:active { transform: translateY(1px); }

    @media (max-width: 560px) {
      #game { min-height: 480px; aspect-ratio: 9 / 13; }
      #player { width: 82px; }
      .hint { font-size: 14px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>接住小星星</h1>
    <p class="hint">左右移动接住星星 ⭐，避开炸弹 💣。电脑用鼠标或方向键，手机直接拖动。</p>

    <div class="panel">
      <div class="badge">分数：<span id="score">0</span></div>
      <div class="badge">生命：<span id="lives">3</span></div>
      <div class="badge">时间：<span id="time">45</span>s</div>
    </div>

    <section id="game" aria-label="接住小星星游戏区域">
      <div id="player"></div>
      <div id="overlay" class="overlay">
        <div class="card">
          <h2>准备好了吗？</h2>
          <p>接住星星得分，碰到炸弹会扣生命。45 秒内尽量拿高分！</p>
          <button id="startBtn">开始游戏</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const game = document.getElementById('game');
    const player = document.getElementById('player');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const timeEl = document.getElementById('time');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');

    let score = 0;
    let lives = 3;
    let timeLeft = 45;
    let playerX = 0;
    let running = false;
    let objects = [];
    let lastSpawn = 0;
    let lastTime = 0;
    let timerId = null;
    let keyDirection = 0;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function gameRect() {
      return game.getBoundingClientRect();
    }

    function setPlayerX(x) {
      const rect = gameRect();
      const half = player.offsetWidth / 2;
      playerX = clamp(x, half, rect.width - half);
      player.style.left = playerX + 'px';
    }

    function resetGame() {
      objects.forEach(obj => obj.el.remove());
      objects = [];
      score = 0;
      lives = 3;
      timeLeft = 45;
      scoreEl.textContent = score;
      livesEl.textContent = lives;
      timeEl.textContent = timeLeft;
      setPlayerX(game.clientWidth / 2);
      lastSpawn = 0;
      lastTime = performance.now();
    }

    function spawnObject() {
      const isBomb = Math.random() < 0.22;
      const el = document.createElement('div');
      el.className = 'star' + (isBomb ? ' bomb' : '');
      el.textContent = isBomb ? '💣' : '⭐';
      const x = Math.random() * (game.clientWidth - 40) + 20;
      const speed = (isBomb ? 170 : 140) + Math.random() * 120 + score * 0.8;
      el.style.left = x + 'px';
      el.style.top = '-30px';
      game.appendChild(el);
      objects.push({ el, x, y: -30, speed, type: isBomb ? 'bomb' : 'star' });
    }

    function hitTest(obj) {
      const p = player.getBoundingClientRect();
      const o = obj.el.getBoundingClientRect();
      return !(o.right < p.left || o.left > p.right || o.bottom < p.top || o.top > p.bottom);
    }

    function update(now) {
      if (!running) return;

      const delta = Math.min((now - lastTime) / 1000, 0.04);
      lastTime = now;

      if (keyDirection !== 0) {
        setPlayerX(playerX + keyDirection * 440 * delta);
      }

      if (now - lastSpawn > Math.max(360, 900 - score * 8)) {
        spawnObject();
        lastSpawn = now;
      }

      for (let i = objects.length - 1; i >= 0; i--) {
        const obj = objects[i];
        obj.y += obj.speed * delta;
        obj.el.style.top = obj.y + 'px';

        if (hitTest(obj)) {
          obj.el.remove();
          objects.splice(i, 1);
          if (obj.type === 'star') {
            score += 10;
            scoreEl.textContent = score;
          } else {
            lives -= 1;
            livesEl.textContent = lives;
            game.animate([
              { transform: 'translateX(0)' },
              { transform: 'translateX(-8px)' },
              { transform: 'translateX(8px)' },
              { transform: 'translateX(0)' }
            ], { duration: 180 });
            if (lives <= 0) endGame('生命用完啦！');
          }
        } else if (obj.y > game.clientHeight + 40) {
          obj.el.remove();
          objects.splice(i, 1);
          if (obj.type === 'star') {
            score = Math.max(0, score - 3);
            scoreEl.textContent = score;
          }
        }
      }

      requestAnimationFrame(update);
    }

    function startGame() {
      resetGame();
      running = true;
      overlay.style.display = 'none';
      timerId = setInterval(() => {
        timeLeft -= 1;
        timeEl.textContent = timeLeft;
        if (timeLeft <= 0) endGame('时间到！');
      }, 1000);
      requestAnimationFrame(update);
    }

    function endGame(title) {
      if (!running) return;
      running = false;
      clearInterval(timerId);
      overlay.style.display = 'grid';
      overlay.innerHTML = `
        <div class="card">
          <h2>${title}</h2>
          <p>你的最终分数是 <strong>${score}</strong>。再来一局，冲击更高分吧！</p>
          <button id="againBtn">再玩一次</button>
        </div>
      `;
      document.getElementById('againBtn').addEventListener('click', startGame);
    }

    game.addEventListener('pointermove', (event) => {
      if (!running) return;
      const rect = gameRect();
      setPlayerX(event.clientX - rect.left);
    });

    game.addEventListener('pointerdown', (event) => {
      if (!running) return;
      const rect = gameRect();
      setPlayerX(event.clientX - rect.left);
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowLeft' || event.key.toLowerCase() === 'a') keyDirection = -1;
      if (event.key === 'ArrowRight' || event.key.toLowerCase() === 'd') keyDirection = 1;
    });

    window.addEventListener('keyup', (event) => {
      if (['ArrowLeft', 'ArrowRight', 'a', 'd', 'A', 'D'].includes(event.key)) keyDirection = 0;
    });

    window.addEventListener('resize', () => setPlayerX(clamp(playerX, player.offsetWidth / 2, game.clientWidth - player.offsetWidth / 2)));
    startBtn.addEventListener('click', startGame);
    setPlayerX(game.clientWidth / 2);
  </script>
</body>
</html>
